<svg width="256" height="256" viewBox="0 0 256 256" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="logo_grad" x1="0" y1="0" x2="256" y2="256" gradientUnits="userSpaceOnUse">
      <stop stop-color="#3B82F6"/>
      <stop offset="1" stop-color="#2563EB"/>
    </linearGradient>
    <filter id="logo_glow" x="-20%" y="-20%" width="140%" height="140%" filterUnits="userSpaceOnUse">
      <blur stdDeviation="8" />
    </filter>
  </defs>
  
  <!-- Outer Ring (Subtle) -->
  <circle cx="128" cy="128" r="120" stroke="#3B82F6" stroke-width="2" stroke-opacity="0.1" />
  
  <!-- Geometric "Z" / Bolt Motif (Representing MSB Speed & Energy) -->
  <path d="M160 40L60 140H120L96 216L196 116H136L160 40Z" fill="url(#logo_grad)" />
  
  <!-- Glow Effect Layer -->
  <path d="M160 40L60 140H120L96 216L196 116H136L160 40Z" fill="#3B82F6" fill-opacity="0.3" filter="url(#logo_glow)" />

  <!-- MSB stylized text (Hidden, but for structure) -->
  <text x="128" y="245" fill="#3B82F6" font-family="Arial" font-weight="900" font-size="24" text-anchor="middle" letter-spacing="4">MSB</text>
</svg>
